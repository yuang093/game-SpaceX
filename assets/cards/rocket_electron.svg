      <stop offset="0%" stop-color="#1a1a2e"/><stop offset="100%" stop-color="#0a0a1a"/>
    </linearGradient>
    <linearGradient id="el" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#222"/><stop offset="50%" stop-color="#555"/><stop offset="100%" stop-color="#222"/>
