  <ellipse cx="120" cy="230" rx="6" ry="14" fill="#FFFFFF"/>
  <text x="120" y="295" text-anchor="middle" fill="#88CCFF" font-size="16" font-weight="bold" font-family="sans-serif" letter-spacing="1">ELECTRON</text>
