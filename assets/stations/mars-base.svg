<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" preserveAspectRatio="xMidYMid meet">
  <defs>
    <radialGradient id="mars-bg">
      <stop offset="0" stop-color="#cc6644"/>
      <stop offset="0.5" stop-color="#884422"/>
      <stop offset="1" stop-color="#441100"/>
    </radialGradient>
  </defs>
  <rect width="400" height="300" fill="#0a0a1a"/>
  <!-- 火星表面 -->
  <ellipse cx="200" cy="350" rx="350" ry="100" fill="url(#mars-bg)" opacity="0.5"/>
  <!-- 火星岩石 -->
  <g fill="#552211" opacity="0.7">
    <ellipse cx="50" cy="260" rx="15" ry="6"/>
    <ellipse cx="100" cy="275" rx="10" ry="4"/>
    <ellipse cx="320" cy="270" rx="12" ry="5"/>
  </g>
  <!-- 火星基地（多個圓頂） -->
  <g transform="translate(200 170)">
    <!-- 主圓頂 -->
    <ellipse cx="0" cy="0" rx="60" ry="35" fill="#cc6644" stroke="#884422" stroke-width="1.5"/>
    <ellipse cx="0" cy="-5" rx="50" ry="25" fill="#88ccff" opacity="0.4" stroke="#00d4ff" stroke-width="0.5"/>
    <!-- 連接通道 -->
    <rect x="-90" y="-2" width="30" height="6" fill="#884422"/>
    <rect x="60" y="-2" width="30" height="6" fill="#884422"/>
    <!-- 副圓頂 -->
    <ellipse cx="-100" cy="0" rx="20" ry="14" fill="#cc6644" stroke="#884422" stroke-width="1"/>
    <ellipse cx="100" cy="0" rx="20" ry="14" fill="#cc6644" stroke="#884422" stroke-width="1"/>
    <!-- 太陽能板 -->
    <rect x="-150" y="-15" width="40" height="30" fill="#1a3a6e" stroke="#00d4ff" stroke-width="0.5"/>
    <rect x="110" y="-15" width="40" height="30" fill="#1a3a6e" stroke="#00d4ff" stroke-width="0.5"/>
    <!-- 登陸墊 -->
    <rect x="-40" y="20" width="80" height="6" fill="#552211"/>
    <text x="0" y="27" text-anchor="middle" font-size="8" fill="#00d4ff">H</text>
    <!-- 機器人探測器 -->
    <rect x="-130" y="20" width="15" height="8" fill="#888"/>
    <circle cx="-127" cy="20" r="2" fill="#ff4466"/>
  </g>
  <!-- 標籤 -->
  <text x="200" y="60" text-anchor="middle" font-size="14" font-family="Arial" font-weight="bold" fill="#ff4466">🔴 MARS BASE</text>
  <text x="200" y="80" text-anchor="middle" font-size="10" font-family="Arial" fill="#888">火星基地 · 225M km</text>
</svg>
