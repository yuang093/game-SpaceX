<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" preserveAspectRatio="xMidYMid meet">
  <defs>
    <radialGradient id="earth-bg">
      <stop offset="0" stop-color="#4488ff"/>
      <stop offset="0.5" stop-color="#2266cc"/>
      <stop offset="1" stop-color="#113388"/>
    </radialGradient>
  </defs>
  <rect width="400" height="300" fill="#050510"/>
  <!-- 地球曲線 -->
  <ellipse cx="200" cy="350" rx="300" ry="100" fill="url(#earth-bg)" opacity="0.6"/>
  <!-- 太空站主體 -->
  <g transform="translate(200 150)">
    <!-- 中心模組 -->
    <rect x="-20" y="-15" width="40" height="30" fill="#d0d0d0" stroke="#666"/>
    <rect x="-15" y="-10" width="30" height="20" fill="#4488ff" opacity="0.7"/>
    <!-- 左太陽能板 -->
    <rect x="-100" y="-25" width="70" height="50" fill="#1a3a6e" stroke="#00d4ff" stroke-width="0.5"/>
    <g stroke="#00d4ff" stroke-width="0.3" opacity="0.7">
      <line x1="-100" y1="-15" x2="-30" y2="-15"/>
      <line x1="-100" y1="-5" x2="-30" y2="-5"/>
      <line x1="-100" y1="5" x2="-30" y2="5"/>
      <line x1="-100" y1="15" x2="-30" y2="15"/>
      <line x1="-85" y1="-25" x2="-85" y2="25"/>
      <line x1="-65" y1="-25" x2="-65" y2="25"/>
      <line x1="-45" y1="-25" x2="-45" y2="25"/>
    </g>
    <!-- 右太陽能板 -->
    <rect x="30" y="-25" width="70" height="50" fill="#1a3a6e" stroke="#00d4ff" stroke-width="0.5"/>
    <g stroke="#00d4ff" stroke-width="0.3" opacity="0.7">
      <line x1="30" y1="-15" x2="100" y2="-15"/>
      <line x1="30" y1="-5" x2="100" y2="-5"/>
      <line x1="30" y1="5" x2="100" y2="5"/>
      <line x1="30" y1="15" x2="100" y2="15"/>
      <line x1="45" y1="-25" x2="45" y2="25"/>
      <line x1="65" y1="-25" x2="65" y2="25"/>
      <line x1="85" y1="-25" x2="85" y2="25"/>
    </g>
    <!-- 連接桁架 -->
    <rect x="-30" y="-3" width="60" height="6" fill="#888"/>
    <!-- 通訊天線 -->
    <line x1="0" y1="-15" x2="0" y2="-40" stroke="#aaa" stroke-width="1"/>
    <circle cx="0" cy="-42" r="3" fill="#ff4466"/>
  </g>
  <!-- 標籤 -->
  <text x="200" y="240" text-anchor="middle" font-size="14" font-family="Arial" font-weight="bold" fill="#00d4ff">🛰️ LEO STATION</text>
  <text x="200" y="260" text-anchor="middle" font-size="10" font-family="Arial" fill="#888">近地軌道站 · 400 km</text>
</svg>
