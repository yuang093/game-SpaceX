<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 400" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="dragon-body" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#d0d0d0"/>
      <stop offset="0.5" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#888"/>
    </linearGradient>
  </defs>
  <rect width="200" height="400" fill="#0a0a1a"/>
  <!-- 太空船主體（膠囊造型） -->
  <ellipse cx="100" cy="100" rx="40" ry="50" fill="url(#dragon-body)" stroke="#666"/>
  <!-- 連接段 -->
  <rect x="78" y="140" width="44" height="30" fill="#aaa" stroke="#666"/>
  <!-- 太陽能板 -->
  <rect x="20" y="170" width="55" height="80" fill="#1a3a6e" stroke="#00d4ff" stroke-width="1"/>
  <g stroke="#00d4ff" stroke-width="0.5" opacity="0.6">
    <line x1="20" y1="190" x2="75" y2="190"/>
    <line x1="20" y1="210" x2="75" y2="210"/>
    <line x1="20" y1="230" x2="75" y2="230"/>
    <line x1="35" y1="170" x2="35" y2="250"/>
    <line x1="50" y1="170" x2="50" y2="250"/>
    <line x1="65" y1="170" x2="65" y2="250"/>
  </g>
  <rect x="125" y="170" width="55" height="80" fill="#1a3a6e" stroke="#00d4ff" stroke-width="1"/>
  <g stroke="#00d4ff" stroke-width="0.5" opacity="0.6">
    <line x1="125" y1="190" x2="180" y2="190"/>
    <line x1="125" y1="210" x2="180" y2="210"/>
    <line x1="125" y1="230" x2="180" y2="230"/>
    <line x1="140" y1="170" x2="140" y2="250"/>
    <line x1="155" y1="170" x2="155" y2="250"/>
    <line x1="170" y1="170" x2="170" y2="250"/>
  </g>
  <!-- 船身標誌 -->
  <text x="100" y="105" text-anchor="middle" font-size="14" font-family="Arial" font-weight="bold" fill="#222">DRAGON</text>
  <!-- 對接環 -->
  <rect x="82" y="280" width="36" height="20" fill="#666"/>
  <rect x="86" y="300" width="28" height="10" fill="#444"/>
  <!-- 引擎火焰 -->
  <path d="M 90 310 Q 95 340 100 380 Q 105 340 110 310 Z" fill="#ff6b35" opacity="0.6"/>
</svg>
