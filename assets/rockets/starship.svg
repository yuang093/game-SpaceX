<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 400" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="ss-body" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#e8e8e8"/>
      <stop offset="0.5" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#a0a0a0"/>
    </linearGradient>
  </defs>
  <rect width="200" height="400" fill="#0a0a1a"/>
  <!-- 箭體（粗壯） -->
  <path d="M 70 50 L 130 50 L 135 350 L 65 350 Z" fill="url(#ss-body)" stroke="#666" stroke-width="1.5"/>
  <!-- 翼面（襟翼） -->
  <path d="M 70 240 L 40 290 L 70 290 Z" fill="#888"/>
  <path d="M 130 240 L 160 290 L 130 290 Z" fill="#888"/>
  <!-- 頭錐 -->
  <path d="M 70 50 Q 100 20 130 50 Z" fill="#999"/>
  <!-- 隔熱瓦紋理 -->
  <g stroke="#bbb" stroke-width="0.3" opacity="0.6">
    <line x1="70" y1="80" x2="130" y2="80"/>
    <line x1="70" y1="100" x2="130" y2="100"/>
    <line x1="70" y1="120" x2="130" y2="120"/>
    <line x1="70" y1="140" x2="130" y2="140"/>
    <line x1="70" y1="160" x2="130" y2="160"/>
    <line x1="70" y1="180" x2="130" y2="180"/>
    <line x1="70" y1="200" x2="130" y2="200"/>
    <line x1="70" y1="220" x2="130" y2="220"/>
    <line x1="68" y1="240" x2="132" y2="240"/>
    <line x1="68" y1="260" x2="132" y2="260"/>
    <line x1="66" y1="280" x2="134" y2="280"/>
    <line x1="66" y1="300" x2="134" y2="300"/>
    <line x1="65" y1="320" x2="135" y2="320"/>
  </g>
  <!-- SpaceX 標誌 -->
  <text x="100" y="160" text-anchor="middle" font-size="11" font-family="Arial" font-weight="bold" fill="#222">STARSHIP</text>
  <!-- Raptor 引擎（多個） -->
  <g fill="#222">
    <rect x="72" y="350" width="10" height="10"/>
    <rect x="86" y="350" width="10" height="10"/>
    <rect x="104" y="350" width="10" height="10"/>
    <rect x="118" y="350" width="10" height="10"/>
  </g>
  <!-- 火焰 -->
  <g opacity="0.8">
    <path d="M 72 360 Q 75 385 77 400 Q 82 385 82 360 Z" fill="#ff6b35"/>
    <path d="M 86 360 Q 89 385 91 400 Q 96 385 96 360 Z" fill="#ff6b35"/>
    <path d="M 104 360 Q 107 385 109 400 Q 114 385 114 360 Z" fill="#ff6b35"/>
    <path d="M 118 360 Q 121 385 123 400 Q 128 385 128 360 Z" fill="#ff6b35"/>
  </g>
</svg>
