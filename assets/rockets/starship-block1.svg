    <path d="M 80 368 Q 82 385 84 400 Q 88 385 89 368 Z" fill="#ff6b35"/>
    <path d="M 92 368 Q 94 385 96 400 Q 100 385 100 368 Z" fill="#ff6b35"/>
    <path d="M 100 368 Q 102 385 104 400 Q 108 385 109 368 Z" fill="#ff6b35"/>
    <path d="M 112 368 Q 114 385 116 400 Q 120 385 121 368 Z" fill="#ff6b35"/>
    <path d="M 123 368 Q 125 385 127 400 Q 132 385 132 368 Z" fill="#ff6b35"/>
