<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 400" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="b1-body" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#e0e0e0"/>
      <stop offset="0.5" stop-color="#f8f8f8"/>
      <stop offset="1" stop-color="#999"/>
    </linearGradient>
  </defs>
  <rect width="200" height="400" fill="#0a0a1a"/>
  <!-- Block 1: 121.3m 總高，較矮粗壯，黑色隔熱瓦顯眼 -->
  <path d="M 65 80 L 135 80 L 138 360 L 62 360 Z" fill="url(#b1-body)" stroke="#666" stroke-width="1.5"/>
  <!-- 大面積黑色隔熱瓦（Block 1 特色：較少、較寬） -->
  <rect x="65" y="150" width="73" height="14" fill="#1a1a1a"/>
  <rect x="65" y="180" width="73" height="10" fill="#1a1a1a"/>
  <rect x="65" y="210" width="73" height="8" fill="#1a1a1a"/>
  <!-- 頭錐（不鏽鋼原色） -->
  <path d="M 65 80 Q 100 50 135 80 Z" fill="#aaa"/>
  <!-- 巨大前襟翼（Block 1 厚實版本） -->
  <path d="M 65 220 L 30 290 L 65 290 Z" fill="#888"/>
  <path d="M 135 220 L 170 290 L 135 290 Z" fill="#888"/>
  <line x1="50" y1="265" x2="65" y2="265" stroke="#fff" stroke-width="0.5" opacity="0.4"/>
  <line x1="150" y1="265" x2="135" y2="265" stroke="#fff" stroke-width="0.5" opacity="0.4"/>
  <!-- 後襟翼（小型） -->
  <path d="M 65 310 L 50 360 L 65 360 Z" fill="#777"/>
  <path d="M 135 310 L 150 360 L 135 360 Z" fill="#777"/>
  <!-- 隔熱瓦紋理 -->
  <g stroke="#bbb" stroke-width="0.3" opacity="0.4">
    <line x1="65" y1="100" x2="135" y2="100"/>
    <line x1="65" y1="120" x2="135" y2="120"/>
    <line x1="65" y1="140" x2="135" y2="140"/>
    <line x1="65" y1="240" x2="135" y2="240"/>
    <line x1="65" y1="260" x2="135" y2="260"/>
    <line x1="65" y1="280" x2="135" y2="280"/>
    <line x1="65" y1="300" x2="135" y2="300"/>
    <line x1="65" y1="320" x2="135" y2="320"/>
    <line x1="65" y1="340" x2="135" y2="340"/>
  </g>
  <text x="100" y="200" text-anchor="middle" font-size="11" font-family="Arial" font-weight="bold" fill="#222">BLOCK 1</text>
  <text x="100" y="215" text-anchor="middle" font-size="7" font-family="Arial" fill="#666">v1.0 · 15t LEO</text>
