<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 400" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="body" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#e8e8e8"/>
      <stop offset="0.5" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#a0a0a0"/>
    </linearGradient>
    <linearGradient id="nose" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff4466"/>
      <stop offset="1" stop-color="#aa2244"/>
    </linearGradient>
  </defs>
  <rect width="200" height="400" fill="#0a0a1a"/>
  <!-- 箭體 -->
  <path d="M 100 40 L 130 130 L 130 320 L 70 320 L 70 130 Z" fill="url(#body)" stroke="#666" stroke-width="1"/>
  <!-- 頭錐 -->
  <path d="M 100 40 L 130 130 L 70 130 Z" fill="url(#nose)"/>
