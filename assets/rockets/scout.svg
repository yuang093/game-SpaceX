  <rect x="78" y="320" width="44" height="20" fill="#444"/>
  <!-- 鰭片 -->
  <path d="M 70 240 L 50 320 L 70 320 Z" fill="#888"/>
  <path d="M 130 240 L 150 320 L 130 320 Z" fill="#888"/>
  <!-- 火焰 -->
  <path d="M 85 340 Q 90 380 100 400 Q 110 380 115 340 Z" fill="#ff6b35" opacity="0.8"/>
  <path d="M 90 340 Q 95 370 100 385 Q 105 370 110 340 Z" fill="#ffcc00" opacity="0.9"/>
