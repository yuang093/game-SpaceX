<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 400" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="mars-body" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#cc7755"/>
      <stop offset="0.5" stop-color="#ee8866"/>
      <stop offset="1" stop-color="#884433"/>
    </linearGradient>
  </defs>
  <rect width="200" height="400" fill="#0a0a1a"/>
  <!-- 火星版：紅色 regolith 隔熱塗裝 -->
  <path d="M 65 70 L 135 70 L 138 360 L 62 360 Z" fill="url(#mars-body)" stroke="#663322" stroke-width="1.5"/>
  <!-- 火星表面隕石坑痕跡（regolith 質感） -->
  <g fill="#884433" opacity="0.6">
    <ellipse cx="80" cy="120" rx="6" ry="3"/>
    <ellipse cx="115" cy="145" rx="4" ry="2"/>
    <ellipse cx="95" cy="200" rx="5" ry="2"/>
    <ellipse cx="120" cy="240" rx="7" ry="3"/>
    <ellipse cx="75" cy="280" rx="4" ry="2"/>
  </g>
  <!-- 火星灰塵感斑點 -->
  <g fill="#aa5544" opacity="0.4">
    <circle cx="90" cy="100" r="1"/>
    <circle cx="110" cy="130" r="1.5"/>
    <circle cx="80" cy="160" r="1"/>
    <circle cx="125" cy="180" r="1"/>
    <circle cx="100" cy="220" r="1.5"/>
    <circle cx="85" cy="250" r="1"/>
    <circle cx="115" cy="290" r="1"/>
  </g>
  <!-- 頭錐 -->
  <path d="M 65 70 Q 100 45 135 70 Z" fill="#aa5544"/>
  <!-- 大型襟翼（標準） -->
  <path d="M 65 220 L 30 290 L 65 290 Z" fill="#884433"/>
  <path d="M 135 220 L 170 290 L 135 290 Z" fill="#884433"/>
  <!-- 隔熱瓦紋理（紅色塗裝） -->
  <g stroke="#aa5544" stroke-width="0.3" opacity="0.5">
    <line x1="65" y1="100" x2="135" y2="100"/>
    <line x1="65" y1="120" x2="135" y2="120"/>
    <line x1="65" y1="140" x2="135" y2="140"/>
    <line x1="65" y1="160" x2="135" y2="160"/>
    <line x1="65" y1="180" x2="135" y2="180"/>
    <line x1="65" y1="200" x2="135" y2="200"/>
    <line x1="65" y1="240" x2="135" y2="240"/>
    <line x1="65" y1="260" x2="135" y2="260"/>
    <line x1="65" y1="280" x2="135" y2="280"/>
    <line x1="65" y1="300" x2="135" y2="300"/>
    <line x1="65" y1="320" x2="135" y2="320"/>
    <line x1="65" y1="340" x2="135" y2="340"/>
  </g>
  <!-- 火星標誌 + 紅色主題 -->
  <text x="100" y="200" text-anchor="middle" font-size="11" font-family="Arial" font-weight="bold" fill="#fff">MARS</text>
  <text x="100" y="213" text-anchor="middle" font-size="7" font-family="Arial" fill="#fff">100t Mars Cargo</text>
  <!-- 火星符號（符號 emoji 風格） -->
  <circle cx="100" cy="50" r="10" fill="#cc4422"/>
  <ellipse cx="95" cy="46" rx="3" ry="2" fill="#aa3322" opacity="0.6"/>
  <text x="100" y="240" text-anchor="middle" font-size="10" fill="#fff">MARS VEHICLE</text>
  <!-- 6 個 Raptor 引擎（火星版更強） -->
  <g fill="#1a1a1a">
    <rect x="65" y="360" width="9" height="8"/>
    <rect x="78" y="360" width="9" height="8"/>
    <rect x="91" y="360" width="9" height="8"/>
    <rect x="100" y="360" width="9" height="8"/>
    <rect x="109" y="360" width="9" height="8"/>
    <rect x="122" y="360" width="9" height="8"/>
  </g>
  <!-- 多重火焰 -->
  <g opacity="0.85">
    <path d="M 65 368 Q 68 385 70 400 Q 74 385 74 368 Z" fill="#ff6b35"/>
    <path d="M 78 368 Q 81 385 83 400 Q 87 385 87 368 Z" fill="#ff6b35"/>
    <path d="M 91 368 Q 94 385 96 400 Q 100 385 100 368 Z" fill="#ff6b35"/>
    <path d="M 100 368 Q 103 385 105 400 Q 109 385 109 368 Z" fill="#ff6b35"/>
    <path d="M 109 368 Q 112 385 114 400 Q 118 385 118 368 Z" fill="#ff6b35"/>
    <path d="M 122 368 Q 125 385 127 400 Q 131 385 131 368 Z" fill="#ff6b35"/>
  </g>
</svg>
